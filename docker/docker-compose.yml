services:
  postgres:
    image: postgres:16-alpine
    container_name: iplay-postgres
    restart: unless-stopped
    # Bind to loopback only on port 5433 to avoid conflict with a system PostgreSQL on 5432.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      # Development defaults only — override via environment variables or a
      # local (git-ignored) .env file. Never put production credentials here.
      POSTGRES_USER: ${POSTGRES_USER:-iplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iplay_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-iplay}
    volumes:
      - iplay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iplay}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  iplay_pgdata:
